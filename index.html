<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>舒爾特方格 1~25</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>舒爾特方格（1~25）</h1>
    <p class="note">依序點擊 1 到 25。點擊「開始」後才會顯示方格內容。</p>

    <div class="controls">
      <button id="startButton" class="start-button" type="button">開始</button>
      <span id="status" class="status">尚未開始</span>
    </div>

    <div id="grid" class="grid hidden" aria-live="polite"></div>

    <p id="result" class="result hidden" aria-live="polite"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
