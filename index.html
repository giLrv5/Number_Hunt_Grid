<!doctype html>
<html lang="zh-Hant">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WGRE5XGNNF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('consent', 'default', {
      analytics_storage: 'granted',
      ad_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied',
      wait_for_update: 500,
    });
    gtag('js', new Date());
    gtag('config', 'G-WGRE5XGNNF');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>碩仁的專注力練習</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div class="heading-group">
        <p id="brand" class="brand">碩仁的專注力練習</p>
        <h1 id="pageTitle">舒爾特方格（1~25）</h1>
      </div>
      <div class="language-switcher" aria-label="Language switcher">
        <button id="langZhButton" class="language-button is-active" type="button" aria-pressed="true">中文</button>
        <button id="langEnButton" class="language-button" type="button" aria-pressed="false">English</button>
      </div>
    </header>

    <p id="intro" class="intro">依序點擊 1 到 25。點擊「開始」後才會顯示方格內容。</p>
    <p id="deviceHint" class="device-hint hidden" aria-live="polite"></p>

    <section id="startScreen" class="start-screen" aria-live="polite">
      <p id="startScreenTitle" class="start-screen-title">準備好了就開始</p>
      <p id="startScreenText" class="start-screen-text">按下按鈕後會先倒數，再正式開始測驗。</p>
      <button id="heroStartButton" class="hero-start-button" type="button">開始</button>
    </section>

    <div class="controls">
      <button id="startButton" class="start-button" type="button">開始</button>
      <span id="status" class="status">尚未開始</span>
    </div>

    <div id="countdown" class="countdown hidden" aria-live="assertive"></div>
    <div id="grid" class="grid hidden" aria-live="polite"></div>

    <section id="result" class="result hidden" aria-live="polite"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
